name: Release & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new-release: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@v2

      - run: npm ci

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  deploy:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - run: npm ci

      - name: Build
        env:
          VITE_ZOHO_CLIENT_ID: ${{ secrets.VITE_ZOHO_CLIENT_ID }}
          VITE_ZOHO_REDIRECT_URI: ${{ secrets.VITE_ZOHO_REDIRECT_URI }}
          VITE_ZOHO_PROXY_URL: ${{ secrets.VITE_ZOHO_PROXY_URL }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          enable_jekyll: false
