name: Release & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *' # 2am UTC daily
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: npm ci

      - name: Lint JS/JSX
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check .

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1

  release:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      new-release: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@v2

      - run: npm ci

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  deploy:
    if: github.event_name != 'pull_request'
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - run: npm ci

      - name: Build
        env:
          VITE_ZOHO_CLIENT_ID: ${{ secrets.VITE_ZOHO_CLIENT_ID }}
          VITE_ZOHO_REDIRECT_URI: ${{ secrets.VITE_ZOHO_REDIRECT_URI }}
          VITE_ZOHO_PROXY_URL: ${{ secrets.VITE_ZOHO_PROXY_URL }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          enable_jekyll: false

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
